#
#  V5
#

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: dot-ai-readonly
rules:
  # 1) Core API group: explicit safe read‑only, no secrets
  - apiGroups: [""]
    resources:
      - pods
      - pods/log
      - pods/status
      - podtemplates
      - services
      - endpoints
      - endpointslices
      - namespaces
      - nodes
      - persistentvolumes
      - persistentvolumeclaims
      - configmaps
      - serviceaccounts
      - events
      - resourcequotas
      - limitranges
      - replicationcontrollers
      - componentstatuses
    verbs: ["get", "list", "watch"]

  # 2) Main app / K8s API groups: read everything
  - apiGroups:
      - "apps"
      - "autoscaling"
      - "batch"
      - "networking.k8s.io"
      - "storage.k8s.io"
      - "rbac.authorization.k8s.io"
      - "apiextensions.k8s.io"
      - "policy"
      - "apiregistration.k8s.io"
      - "admissionregistration.k8s.io"
      - "metrics.k8s.io"
      - "scheduling.k8s.io"
      - "flowcontrol.apiserver.k8s.io"
      - "node.k8s.io"
      - "resource.k8s.io"
      - "certificates.k8s.io"
      - "discovery.k8s.io"
      - "events.k8s.io"
    resources: ["*"]
    verbs: ["get", "list", "watch"]

  # 3) CRDs and CRs across all groups: read, no write
  # - apiGroups: ["*"]
  #   resources:
  #     - customresourcedefinitions
  #     - "*"
  #   verbs: ["get", "list", "watch"]

  # 4) dot‑ai CRDs on client: read only, no status write‑back
  - apiGroups: ["dot-ai.devopstoolkit.live"]
    resources: ["*"]
    verbs: ["get", "list", "watch"]

  # 5) LEADER ELECTION ONLY IF YOU ACTUALLY RUN LEADER ELECTION ON CLIENT
  #    If you *do not* run leader‑elected controller on the client, omit this.
  - apiGroups: ["coordination.k8s.io"]
    resources: ["leases"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]



