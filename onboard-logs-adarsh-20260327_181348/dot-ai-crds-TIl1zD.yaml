      status: "True"
      type: NamesAccepted
    - lastTransitionTime: "2026-03-27T12:26:42Z"
      message: the initial names have been accepted
      reason: InitialNamesAccepted
      status: "True"
      type: Established
    storedVersions:
    - v1alpha1
