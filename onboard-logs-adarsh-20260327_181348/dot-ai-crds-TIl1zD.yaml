    names:
      kind: GitKnowledgeSource
      listKind: GitKnowledgeSourceList
      plural: gitknowledgesources
      shortNames:
      - gks
      singular: gitknowledgesource
    scope: Namespaced
    versions:
    - additionalPrinterColumns:
      - description: Current sync phase
        jsonPath: .status.phase
        name: Phase
        type: string
      - description: Whether sync is active
        jsonPath: .status.active
        name: Active
        type: boolean
      - description: Number of synced documents
        jsonPath: .status.documentCount
        name: Documents
        type: integer
      - description: Time of last sync
        jsonPath: .status.lastSyncTime
        name: Last Sync
        type: date
      - description: Sync error count
        jsonPath: .status.syncErrors
        name: Errors
        type: integer
      - description: Time since creation
        jsonPath: .metadata.creationTimestamp
        name: Age
        type: date
      name: v1alpha1
      schema:
        openAPIV3Schema:
          description: |-
            GitKnowledgeSource is the Schema for the gitknowledgesources API
            It defines a Git repository to sync documents from into the MCP knowledge base
            Works with any Git provider: GitHub, GitLab, Bitbucket, Gitea, self-hosted
          properties:
            apiVersion:
              description: |-
                APIVersion defines the versioned schema of this representation of an object.
                Servers should convert recognized schemas to the latest internal value, and
                may reject unrecognized values.
                More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
              type: string
            kind:
              description: |-
                Kind is a string value representing the REST resource this object represents.
                Servers may infer this from the endpoint the client submits requests to.
                Cannot be updated.
                In CamelCase.
                More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
              type: string
            metadata:
              type: object
            spec:
              description: GitKnowledgeSourceSpec defines the desired state of GitKnowledgeSource
              properties:
                deletionPolicy:
                  default: Delete
                  description: |-
                    DeletionPolicy specifies what happens to ingested documents when this CR is deleted.
                    Delete (default): Documents are removed from MCP knowledge base.
                    Retain: Documents remain in MCP knowledge base.
                  enum:
                  - Delete
                  - Retain
                  type: string
                exclude:
                  description: |-
                    Exclude specifies glob patterns for files to exclude
                    Example: ["docs/internal/**"]
                  items:
                    type: string
                  type: array
                maxFileSizeBytes:
                  description: |-
                    MaxFileSizeBytes limits the maximum file size to process
                    Files larger than this are skipped and reported in status
                  format: int64
                  type: integer
                mcpServer:
                  description: McpServer configures the MCP server endpoint for knowledge
                    ingestion
                  properties:
                    authSecretRef:
                      description: AuthSecretRef references a Secret containing the
                        MCP authentication token
                      properties:
                        key:
                          description: Key within the secret containing the value
                          type: string
                        name:
                          description: Name of the secret in the same namespace as
                            the resource
                          type: string
                      required:
                      - key
                      - name
                      type: object
                    httpTimeoutSeconds:
                      default: 120
                      description: |-
                        HttpTimeoutSeconds is the HTTP timeout in seconds for MCP API calls
                        Increase this if syncing large documents that take longer to process
                      maximum: 600
                      minimum: 5
                      type: integer
                    url:
                      description: |-
                        URL is the MCP server endpoint
                        Example: "http://mcp-server.dot-ai.svc:3456"
                      pattern: ^https?://.*
                      type: string
                  required:
                  - authSecretRef
                  - url
                  type: object
                metadata:
                  additionalProperties:
                    type: string
                  description: Metadata contains key-value pairs attached to all ingested
                    documents
                  type: object
                paths:
                  description: |-
                    Paths specifies glob patterns for files to include
                    Example: ["docs/**/*.md", "README.md"]
                  items:
                    type: string
                  minItems: 1
                  type: array
                repository:
                  description: Repository defines the Git repository to sync documents
                    from
                  properties:
                    branch:
                      default: main
                      description: Branch is the Git branch to sync from
                      type: string
                    depth:
                      default: 1
                      description: |-
                        Depth is the shallow clone depth for the initial sync
                        Subsequent syncs use --shallow-since to fetch only recent commits
                      minimum: 1
                      type: integer
                    secretRef:
                      description: |-
                        SecretRef references a Secret containing the Git authentication token
                        The token should be in the specified key within the Secret
                      properties:
                        key:
                          description: Key within the secret containing the value
                          type: string
                        name:
                          description: Name of the secret in the same namespace as
                            the resource
                          type: string
                      required:
                      - key
                      - name
                      type: object
                    url:
                      description: |-
                        URL is the Git repository URL (HTTPS only)
                        Example: "https://github.com/acme/platform.git"
                      pattern: ^https://.*
                      type: string
                  required:
                  - url
                  type: object
                schedule:
                  default: '@every 24h'
                  description: |-
                    Schedule specifies when to sync using cron syntax or interval format
                    Supports standard cron (e.g., "0 3 * * *") or intervals (e.g., "@every 24h")
                    Default: "@every 24h" (once per day, staggered based on CR creation time)
                  type: string
              required:
              - mcpServer
              - paths
              - repository
              type: object
            status:
              description: GitKnowledgeSourceStatus defines the observed state of
                GitKnowledgeSource
              properties:
                active:
                  description: Active indicates whether the controller is actively
                    syncing this source
                  type: boolean
                conditions:
                  description: Conditions represent the latest available observations
                    of the GitKnowledgeSource's state
                  items:
                    description: Condition contains details for one aspect of the
                      current state of this API Resource.
                    properties:
                      lastTransitionTime:
                        description: |-
                          lastTransitionTime is the last time the condition transitioned from one status to another.
                          This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                        format: date-time
                        type: string
                      message:
                        description: |-
                          message is a human readable message indicating details about the transition.
                          This may be an empty string.
                        maxLength: 32768
                        type: string
                      observedGeneration:
                        description: |-
                          observedGeneration represents the .metadata.generation that the condition was set based upon.
                          For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                          with respect to the current state of the instance.
                        format: int64
                        minimum: 0
                        type: integer
                      reason:
                        description: |-
                          reason contains a programmatic identifier indicating the reason for the condition's last transition.
                          Producers of specific condition types may define expected values and meanings for this field,
                          and whether the values are considered a guaranteed API.
                          The value should be a CamelCase string.
                          This field may not be empty.
                        maxLength: 1024
                        minLength: 1
                        pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                        type: string
                      status:
                        description: status of the condition, one of True, False,
                          Unknown.
                        enum:
                        - "True"
                        - "False"
                        - Unknown
                        type: string
                      type:
                        description: type of condition in CamelCase or in foo.example.com/CamelCase.
                        maxLength: 316
                        pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                        type: string
                    required:
                    - lastTransitionTime
                    - message
                    - reason
                    - status
                    - type
                    type: object
                  type: array
                  x-kubernetes-list-map-keys:
                  - type
                  x-kubernetes-list-type: map
                documentCount:
                  description: DocumentCount is the number of documents currently
                    synced
                  type: integer
                lastError:
                  description: LastError contains the most recent error message
                  type: string
                lastSyncTime:
                  description: LastSyncTime is the timestamp of the last successful
                    sync
                  format: date-time
                  type: string
                lastSyncedCommit:
                  description: LastSyncedCommit is the Git commit SHA of the last
                    successful sync
                  type: string
                nextScheduledSync:
                  description: NextScheduledSync is the timestamp of the next scheduled
                    sync
                  format: date-time
                  type: string
                observedGeneration:
                  description: ObservedGeneration reflects the generation most recently
                    observed by the controller
                  format: int64
                  type: integer
                phase:
                  description: Phase indicates the current sync phase (Syncing, Synced,
                    Error)
                  type: string
                skippedDocuments:
                  description: SkippedDocuments is the count of documents skipped
                    due to filters
                  type: integer
                skippedFiles:
                  description: SkippedFiles lists files that were skipped with reasons
                  items:
                    description: |-
                      SkippedFile represents a file or document that was skipped during sync
                      Used by knowledge source CRDs to report skipped items in status
                    properties:
                      path:
                        description: Path is the file path or identifier relative
                          to the source
                        type: string
                      reason:
                        description: Reason explains why the file was skipped
                        type: string
                    required:
                    - path
                    - reason
                    type: object
                  type: array
                syncErrors:
                  description: SyncErrors is the count of errors in the last sync
                  type: integer
              type: object
          type: object
      served: true
      storage: true
      subresources:
        status: {}
  status:
    acceptedNames:
      kind: GitKnowledgeSource
      listKind: GitKnowledgeSourceList
      plural: gitknowledgesources
      shortNames:
      - gks
      singular: gitknowledgesource
    conditions:
    - lastTransitionTime: "2026-03-27T12:26:42Z"
