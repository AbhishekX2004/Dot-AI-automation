apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: dot-ai-pure-readonly
rules:
  # 1. Core API Group (Safe default resources only, deliberately omitting "secrets")
  - apiGroups: [""]
    resources:
      - pods
      - pods/log
      - pods/status
      - podtemplates
      - services
      - endpoints
      - namespaces
      - nodes
      - persistentvolumes
      - persistentvolumeclaims
      - configmaps
      - serviceaccounts
      - events
      - resourcequotas
      - limitranges
      - replicationcontrollers
      - componentstatuses
      - secrets
    verbs: ["get", "list", "watch"]

  # 1b. Non-Core API Groups (Wildcard. Safe because secrets only exist in the core group)
  - apiGroups:
      - "apps"
      - "autoscaling"
      - "batch"
      - "networking.k8s.io"
      - "storage.k8s.io"
      - "rbac.authorization.k8s.io"
      - "apiextensions.k8s.io"
      - "policy"
      - "apiregistration.k8s.io"
      - "admissionregistration.k8s.io"
      - "metrics.k8s.io"
      - "scheduling.k8s.io"
      - "flowcontrol.apiserver.k8s.io"
      - "node.k8s.io"
      - "resource.k8s.io"
      - "certificates.k8s.io"
      - "discovery.k8s.io"
      - "events.k8s.io"
      - "dot-ai.devopstoolkit.live"
    resources: ["*"]
    verbs: ["get", "list", "watch"]
    
  # Controller Exemption: The Hub controller *must* be allowed to write the sync status
  # back to the spoke cluster, otherwise its synchronization loop will crash with a 403.
  - apiGroups: ["dot-ai.devopstoolkit.live"]
    resources: ["resourcesyncconfigs/status"]
    verbs: ["get", "update", "patch"]
    
  # Leader Election: Write access for leases is required by default for the controller-runtime manager
  - apiGroups: ["coordination.k8s.io"]
    resources: ["leases"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
