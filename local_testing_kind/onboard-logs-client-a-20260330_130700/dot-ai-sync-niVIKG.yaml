apiVersion: dot-ai.devopstoolkit.live/v1alpha1
kind: ResourceSyncConfig
metadata:
  name: default-sync
  namespace: client-a
spec:
  debounceWindowSeconds: 10
  mcpAuthSecretRef:
    key: auth-token
    name: dot-ai-secrets
  mcpEndpoint: http://dot-ai.client-a.svc.cluster.local:3456/api/v1/resources/sync
  resyncIntervalMinutes: 60
