apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: dot-ai-namespace-write
  namespace: placeholder
rules:
  - apiGroups: ["dot-ai.devopstoolkit.live"]
    resources: ["*"]
    verbs: ["*"]
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list", "create", "update", "patch"]
  - apiGroups: [""]
    resources: ["namespaces"]
    verbs: ["get"]